apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: student-management-workloads
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/SachinthaDaham/student-management-gitops.git'
    targetRevision: HEAD
    path: environments/production
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
