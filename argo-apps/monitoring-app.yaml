apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    targetRevision: 48.2.1
    chart: kube-prometheus-stack
    helm:
      skipCrds: true
      values: |
        grafana:
          adminPassword: "prom-operator"
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
            hosts:
              - grafana.13.53.93.82.nip.io
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.13.53.93.82.nip.io
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki-stack.monitoring.svc.cluster.local:3100
              access: proxy
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
        alertmanager:
          config:
            global:
              resolve_timeout: 5m
              smtp_smarthost: 'smtp.gmail.com:587'
              smtp_from: 'sachinthadaham66@gmail.com'
              smtp_auth_username: 'sachinthadaham66@gmail.com'
              smtp_auth_password: '<YOUR_GMAIL_APP_PASSWORD>'
            route:
              group_by: ['job']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'email-alert'
            receivers:
            - name: 'email-alert'
              email_configs:
              - to: 'sachinthadaham66@gmail.com'
                send_resolved: true
        additionalPrometheusRulesMap:
          rule-name:
            groups:
              - name: microservice-alerts
                rules:
                  - alert: MicroserviceDown
                    expr: up{namespace="production"} == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Microservice {{ $labels.app }} is down"
                      description: "The microservice {{ $labels.app }} in namespace {{ $labels.namespace }} has been down for more than 1 minute."
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: kube-prometheus-stack-admission
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: kube-prometheus-stack-admission
    - group: rbac.authorization.k8s.io
      kind: Role
      name: kube-prometheus-stack-admission
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
      name: kube-prometheus-stack-admission
    - group: ""
      kind: ServiceAccount
      name: kube-prometheus-stack-admission
