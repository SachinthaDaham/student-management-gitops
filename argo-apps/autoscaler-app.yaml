apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-autoscaler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: 'https://kubernetes.github.io/autoscaler'
    targetRevision: 9.37.0
    chart: cluster-autoscaler
    helm:
      values: |
        autoDiscovery:
          clusterName: student-mgmt-cluster
        awsRegion: eu-north-1
        rbac:
          create: true
          serviceAccount:
            create: true
            name: cluster-autoscaler
            annotations:
              eks.amazonaws.com/role-arn: arn:aws:iam::355878729662:role/cluster-autoscaler-student-mgmt
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
