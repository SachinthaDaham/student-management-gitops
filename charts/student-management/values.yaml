services:
  auth-service:
    port: 3005
    replicas: 2
  billing-service:
    port: 3003
    replicas: 2
  course-service:
    port: 3001
    replicas: 2
  enrollment-service:
    port: 3002
    replicas: 2
  notification-service:
    port: 3004
    replicas: 2
  student-service:
    port: 3000
    replicas: 2

image:
  repository: 355878729662.dkr.ecr.eu-north-1.amazonaws.com/student-management-app
